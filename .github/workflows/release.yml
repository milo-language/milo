name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      # tests/typecheck.test.ts runs tsc, which needs @types/bun from node_modules.
      # `bun test` runs fine without deps, so a missing install only shows up as the
      # typecheck gate reporting 162 phantom "cannot find name 'console'" errors.
      - run: bun install --frozen-lockfile
      # Match the CI workflow's toolchain: z3 for the contract gate, lld for the
      # bare-metal ARM link tests (-fuse-ld=lld in tests/embedded.test.ts).
      - run: brew install z3
      - run: brew install lld
      - run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          # darwin-x64 cross-compiles from the arm64 mac runner via bun --target;
          # the free macos-13 Intel runner image is being retired and queues forever.
          - os: macos-latest
            target: darwin-arm64
            buntarget: bun-darwin-arm64
          - os: macos-latest
            target: darwin-x64
            buntarget: bun-darwin-x64
          - os: ubuntu-latest
            target: linux-x64
            buntarget: bun-linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            buntarget: bun-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun run scripts/bundle-stdlib.ts
      - run: bun build --compile --target=${{ matrix.buntarget }} src/main.ts --outfile milo
      - run: tar czf milo-${{ matrix.target }}.tar.gz milo
      - uses: actions/upload-artifact@v7
        with:
          name: milo-${{ matrix.target }}
          path: milo-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - run: ls -lh milo-*.tar.gz
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from the latest passing commit on main.
            Built from ${{ github.sha }}.
          prerelease: true
          make_latest: true
          files: milo-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
