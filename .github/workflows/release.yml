name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Match the CI workflow's toolchain: z3 for the contract gate, lld for the
      # bare-metal ARM link tests (-fuse-ld=lld in tests/embedded.test.ts).
      - run: brew install z3
      - run: brew install lld
      - run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run scripts/bundle-stdlib.ts
      - run: bun build --compile src/main.ts --outfile milo
      - run: tar czf milo-${{ matrix.target }}.tar.gz milo
      - uses: actions/upload-artifact@v4
        with:
          name: milo-${{ matrix.target }}
          path: milo-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: ls -lh milo-*.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from the latest passing commit on main.
            Built from ${{ github.sha }}.
          prerelease: true
          make_latest: true
          files: milo-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
