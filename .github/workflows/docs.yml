name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Compile the Milo emulator cores to JS and stage each demo under the
      # VitePress public dir so they deploy at /milo/nes/, /milo/genesis/ and
      # /milo/snes/. Source of truth stays in examples/emulators/*/web; the *-core.js
      # files are regenerated here to match their webcore.milo.
      - name: Build Milo browser demos
        run: |
          bun install
          bun run src/main.ts emit-js examples/emulators/nes/webcore.milo -o examples/emulators/nes/web/nes-core.js
          bun run src/main.ts emit-js examples/emulators/genesis/genesisWebcore.milo -o examples/emulators/genesis/web/genesis-core.js
          bun run src/main.ts emit-js examples/emulators/snes/snesWebcore.milo -o examples/emulators/snes/web/snes-core.js
          mkdir -p docs/site/public/nes docs/site/public/genesis docs/site/public/snes
          cp examples/emulators/nes/web/index.html examples/emulators/nes/web/nes-core.js docs/site/public/nes/
          cp examples/emulators/genesis/web/index.html examples/emulators/genesis/web/genesis-core.js docs/site/public/genesis/
          cp examples/emulators/snes/web/index.html examples/emulators/snes/web/snes-core.js docs/site/public/snes/

      - name: Install dependencies
        run: cd docs/site && bun install

      - name: Build
        run: cd docs/site && bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
