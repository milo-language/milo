name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Compile the Milo NES core to JS and stage the demo under the VitePress
      # public dir so it deploys at /milo/nes/. Source of truth stays in
      # examples/apps/nes/web; nes-core.js is regenerated here to match webcore.milo.
      - name: Build Milo NES browser demo
        run: |
          bun install
          bun run src/main.ts emit-js examples/apps/nes/webcore.milo -o examples/apps/nes/web/nes-core.js
          mkdir -p docs/site/public/nes
          cp examples/apps/nes/web/index.html examples/apps/nes/web/nes-core.js docs/site/public/nes/

      - name: Install dependencies
        run: cd docs/site && bun install

      - name: Build
        run: cd docs/site && bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
