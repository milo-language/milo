name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # tests/typecheck.test.ts runs tsc, which needs @types/bun from node_modules —
      # without it every `console`/`process`/`Buffer` is an error. `bun test` happens to
      # run fine without deps, which is exactly why this gap stayed invisible.
      - run: bun install --frozen-lockfile
      # z3 lets the contract gate (tests/verify-contracts.test.ts) discharge the
      # nonlinear/bitwise contracts the native QF_LIA prover can only mark unknown.
      # If this step ever flakes, the gate falls back to the native solver (fewer
      # proofs, still green) rather than failing the build.
      - run: brew install z3
      # lld provides ld.lld, which `milo build --target=cortex-m3` invokes via
      # -fuse-ld=lld to link freestanding ARM ELF executables (tests/embedded.test.ts).
      - run: brew install lld
      - run: bun test
      # Checks every scalar-returning `extern fn` against this runner's real headers.
      # Needs no annotations; see the script's header for what it does and doesn't cover.
      - run: bun run scripts/audit-extern-returns.ts

  # Nothing has ever executed std/*.linux.milo — epoll, eventfd, the glibc paths — because
  # the suite above runs on macOS only. This job is the first thing that does.
  #
  # It is NOT known-green: it has never run. Verifying it locally wasn't possible — a
  # container is ~5x slower than the host, so the fixture-compile pool blows its 300s
  # budget and every test cascades to failure for a reason that says nothing about Linux.
  # A CI runner is the cheapest honest answer. If this goes red, read the failures before
  # assuming the job is at fault: the point is that this code has never been tested.
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # z3 mirrors the macOS job's contract gate. lld provides ld.lld for the bare-metal
      # ARM link; qemu-system-arm runs those binaries (tests/embedded.test.ts skips itself
      # when QEMU is absent, so without it that lane silently proves nothing).
      - run: sudo apt-get update && sudo apt-get install -y z3 lld qemu-system-arm libssl-dev libsqlite3-dev
      - run: bun test
      # Reads this runner's headers, so it's the only thing that can check the Linux decls.
      - run: bun run scripts/audit-extern-returns.ts

  # Windows is a partial target: the compiler runs, resolves x86_64-pc-windows-msvc, and
  # builds+runs programs that stay inside the print/arith/collections core. The std
  # modules with a POSIX-only platform arm (net, fs event loop, pty) do NOT work yet —
  # see docs/roadmap.md. So this job deliberately does NOT run the full suite; widening
  # it before those arms exist would just pin a wall of known failures.
  #
  # It IS the only place generated code executes on real Windows. The mac/linux dev loop
  # cross-compiles via xwin and runs under Wine, which validates the link and the CRT
  # calls but is not the OS. This job is the authority on "does it actually run".
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # clang emits the COFF object and drives the link; the runner's bundled MSVC
      # supplies the CRT and SDK, which clang locates on its own on a real Windows host
      # (no xwin / MILO_WINDOWS_SDK needed here — that is the cross-compile path only).
      - name: Install LLVM
        run: choco install llvm --no-progress -y
      # Dump the toolchain up front: when this job goes red, the version/triple it
      # actually resolved is the first thing you need and the most annoying to get.
      - name: Toolchain info
        run: |
          clang --version
          clang -print-target-triple
          bun run src/main.ts --help | Select-String -Pattern "target" -SimpleMatch
        continue-on-error: true
      - run: bun test tests/hostTarget.test.ts
      # The end-to-end proof, kept separate from the test runner so a failure here is
      # unambiguous: the compiler built a PE and Windows itself executed it.
      - name: Build and run hello.exe
        run: |
          bun run src/main.ts build examples/hello.milo -o hello
          ./hello.exe
      # On failure the IR is what you need and cannot get afterwards; emitting it costs
      # a second and turns a red X into something diagnosable without a second push.
      - name: Emit IR on failure
        if: failure()
        run: bun run src/main.ts emit-ir examples/hello.milo
        continue-on-error: true
